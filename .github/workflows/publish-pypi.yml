name: Publish to PyPI

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run repository validation
        run: python3 scripts/validate-waybill.py

      - name: Compile Python files
        run: python3 -m py_compile cli/waybill waybill_core/*.py scripts/validate-waybill.py

      - name: Check tag matches package version
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: python3 -c "import os, tomllib; version = tomllib.load(open('pyproject.toml', 'rb'))['project']['version']; tag = os.environ['GITHUB_REF_NAME']; raise SystemExit(0 if tag == f'v{version}' else f'tag {tag} does not match package version v{version}')"

      - name: Dry-run agent smoke commands
        run: scripts/smoke-agents.sh --dry-run

      - name: Install build backend
        run: python3 -m pip install --upgrade build

      - name: Build distributions
        run: python3 -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish package
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: pypi
      url: https://pypi.org/p/agent-waybill
    permissions:
      id-token: write

    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
